name: CI — Soroban Contracts

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4305bde6d918f83e8d33c21e47bae9b60cc4f39b # stable @ 2025-12-01 — SC-X06: pinned SHA, not mutable tag
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build all contracts
        run: cargo build --target wasm32-unknown-unknown --release

  test:
    name: Test Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4305bde6d918f83e8d33c21e47bae9b60cc4f39b # stable @ 2025-12-01 — SC-X06: pinned SHA, not mutable tag

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run compliance tests
        run: cargo test --test compliance

  sdk:
    name: SDK (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK deps
        # SC-M02: npm ci requires package-lock.json and fails on any drift —
        # use instead of npm install to ensure reproducible installs.
        run: npm ci --prefix sdk

      - name: Build SDK
        run: npm run build --prefix sdk

      - name: Test SDK
        run: npm test --prefix sdk

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4305bde6d918f83e8d33c21e47bae9b60cc4f39b # stable @ 2025-12-01 — SC-X06: pinned SHA, not mutable tag
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Soroban CLI
        uses: dtolnay/rust-toolchain@4305bde6d918f83e8d33c21e47bae9b60cc4f39b # stable @ 2025-12-01 — SC-X06: pinned SHA, not mutable tag
        with:
          targets: wasm32-unknown-unknown

      - name: Install Soroban CLI
        # SC-H06: pin exact version — unpinned installs are a supply-chain risk
        # when this step has access to DEPLOYER_SECRET_KEY.
        # Keep in sync with soroban-sdk version in Cargo.toml.
        run: cargo install --locked soroban-cli --version "=21.0.0"

      - name: Build contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Deploy to testnet
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET }}
        run: ./scripts/deploy-testnet.sh
